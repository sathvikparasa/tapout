name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject infra config into app.yaml
        env:
          VPC_CONNECTOR: ${{ secrets.GCP_VPC_CONNECTOR }}
          CLOUD_SQL_INSTANCES: ${{ secrets.GCP_CLOUD_SQL_INSTANCES }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
        run: |
          cat >> backend/app.yaml << EOF

          vpc_access_connector:
            name: $VPC_CONNECTOR

          beta_settings:
            cloud_sql_instances: $CLOUD_SQL_INSTANCES

          EOF
          printf '  REDIS_HOST: "%s"\n' "$REDIS_HOST" >> backend/app.yaml
          printf '  REDIS_PORT: "%s"\n' "$REDIS_PORT" >> backend/app.yaml

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to App Engine
        uses: google-github-actions/deploy-appengine@v2
        with:
          working_directory: backend
          project_id: tapout-485821
